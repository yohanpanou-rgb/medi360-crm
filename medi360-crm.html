<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>medi360 CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2B3BF0;--blue-soft:#eef0fe;--navy:#1a1f3a;--white:#fff;
  --surface:#f6f8fc;--surface-2:#edf1f7;--border:rgba(26,31,58,0.1);--border-2:rgba(26,31,58,0.06);
  --green:#10b981;--green-soft:#d1fae5;--amber:#f59e0b;--amber-soft:#fef3c7;
  --red:#ef4444;--red-soft:#fee2e2;--text:#1a1f3a;--text-2:#5b6380;--text-3:#9aa0b8;
  --radius:12px;--shadow-sm:0 1px 3px rgba(26,31,58,0.06);--shadow:0 4px 16px rgba(26,31,58,0.08);
  --shadow-lg:0 16px 48px rgba(26,31,58,0.14);--sidebar-w:240px;--font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--surface);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
input,select{font-family:var(--font);font-size:13px;color:var(--text);background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;outline:none;width:100%;transition:.18s}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,59,240,0.08)}
input::placeholder{color:var(--text-3)}
button{font-family:var(--font);cursor:pointer;border:none;transition:.18s}

/* LAYOUT */
#app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .18s}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.logo-mark{position:relative;width:28px;height:18px;flex-shrink:0}
.logo-mark span{position:absolute;width:18px;height:18px;border-radius:50%;top:0}
.logo-mark span:first-child{background:rgba(255,255,255,0.35);left:0}
.logo-mark span:last-child{background:var(--blue);left:10px}
.logo-text{color:#fff;font-size:16px;font-weight:500}
.logo-sub{color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;display:block;margin-top:1px}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.25);padding:14px 10px 6px;font-weight:500}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;margin-bottom:2px;position:relative;transition:.18s;user-select:none}
.nav-item:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06)}
.nav-item.active{color:#fff;background:rgba(43,59,240,0.3);font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:2.5px;background:var(--blue);border-radius:99px}
.nav-badge{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,0.06)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer}
.user-card:hover{background:rgba(255,255,255,0.06)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#6b7ff0);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.user-name{color:rgba(255,255,255,0.85);font-size:12px;font-weight:500}
.user-role{color:rgba(255,255,255,0.3);font-size:10px}
.logout-btn{margin-left:auto;background:none;color:rgba(255,255,255,0.3);font-size:14px;padding:4px;border-radius:4px}
.logout-btn:hover{color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.08)}
.main-area{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
.topbar{height:60px;background:var(--white);border-bottom:1px solid var(--border-2);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.hamburger{display:none;flex-direction:column;gap:4px;padding:8px;background:none;border-radius:6px}
.hamburger span{width:18px;height:2px;background:var(--navy);border-radius:99px;display:block}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99}

/* PAGE */
.page{padding:28px;animation:pageIn .2s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:600;color:var(--navy);letter-spacing:-.4px}
.page-sub{font-size:12px;color:var(--text-2);margin-top:3px}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border-2);box-shadow:var(--shadow-sm);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border-2);padding:20px;box-shadow:var(--shadow-sm);transition:.18s}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.stat-label{font-size:11px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.stat-value{font-size:30px;font-weight:600;letter-spacing:-1px;line-height:1;margin-bottom:8px}
.stat-change{font-size:11px;color:var(--text-3)}
.stat-change.up{color:var(--green)}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface)}
th{padding:10px 16px;text-align:left;font-size:10.5px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
td{padding:13px 16px;font-size:13px;border-top:1px solid var(--border-2)}
tr:hover td{background:var(--surface)}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;white-space:nowrap}
.badge-blue{background:var(--blue-soft);color:var(--blue)}
.badge-green{background:var(--green-soft);color:#065f46}
.badge-amber{background:var(--amber-soft);color:#92400e}
.badge-red{background:var(--red-soft);color:#991b1b}
.badge-gray{background:var(--surface-2);color:var(--text-2)}
.badge-navy{background:rgba(26,31,58,0.08);color:var(--navy)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;line-height:1;white-space:nowrap;transition:.18s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1e2cb8;box-shadow:0 4px 12px rgba(43,59,240,0.3)}
.btn-ghost{background:transparent;color:var(--text-2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--surface);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-success{background:var(--green-soft);color:#065f46}
.btn-success:hover{background:var(--green);color:#fff}

/* SEARCH */
.search-wrap{position:relative}
.search-wrap input{padding-left:36px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;font-size:15px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,12,24,0.45);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;animation:slideUp .2s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{padding:22px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--surface-2);color:var(--text-2);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1}
.modal-close:hover{background:var(--surface)}
.modal-body{padding:20px 24px}
.modal-footer{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* APPT CARDS */
.appt-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border-2);padding:16px 20px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow-sm);transition:.18s;margin-bottom:8px}
.appt-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.appt-time{width:56px;text-align:center;background:var(--blue-soft);border-radius:10px;padding:8px 0;flex-shrink:0}
.appt-time-val{font-size:15px;font-weight:600;color:var(--blue);font-family:var(--mono)}
.appt-time-date{font-size:10px;color:var(--text-3);margin-top:2px}
.appt-info{flex:1;min-width:0}
.appt-name{font-size:13px;font-weight:500}
.appt-meta{font-size:12px;color:var(--text-2);margin-top:2px}
.appt-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.date-group-label{font-size:11px;font-weight:600;color:var(--text-2);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:20px}
.date-group-label::after{content:'';height:1px;flex:1;background:var(--border-2)}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;background:linear-gradient(135deg,#0d1129 0%,#1a1f3a 50%,#0f1628 100%);position:relative;overflow:hidden}
.login-blob1{position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(43,59,240,0.12);top:-100px;right:-80px;filter:blur(60px);pointer-events:none}
.login-blob2{position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(43,59,240,0.07);bottom:40px;left:-60px;filter:blur(50px);pointer-events:none}
.login-card{margin:auto;width:100%;max-width:400px;padding:20px 16px;position:relative;z-index:1}
.login-inner{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px 36px}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo-mark{display:inline-flex;margin-bottom:14px}
.login-logo-mark span:first-child{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.3);display:block}
.login-logo-mark span:last-child{width:22px;height:22px;border-radius:50%;background:var(--blue);margin-left:-8px;display:block}
.login-title{font-size:22px;font-weight:500;color:#fff;letter-spacing:-.5px;display:block}
.login-sub{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;margin-top:3px;display:block}
.login-label{display:block;font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);margin-bottom:6px}
.login-input{background:rgba(255,255,255,0.06)!important;border:1.5px solid rgba(255,255,255,0.1)!important;color:#fff!important;margin-bottom:16px}
.login-input::placeholder{color:rgba(255,255,255,0.3)!important}
.login-error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;font-size:12px;padding:10px 14px;border-radius:8px;margin-bottom:16px}
.login-btn{width:100%;padding:12px;border-radius:10px;background:var(--blue);color:#fff;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:.18s}
.login-btn:hover{background:#1e2cb8;box-shadow:0 4px 12px rgba(43,59,240,0.4)}
.login-demo{margin-top:24px;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:8px}
.login-demo-label{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.login-demo-creds{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.4);line-height:1.8}

/* AVATAR */
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--text-2)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg)}
  .overlay.open{display:block}
  .main-area{margin-left:0}
  .hamburger{display:flex}
  .page{padding:16px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:12px}
  .stat-value{font-size:24px}
  .page-header{flex-direction:column;align-items:flex-start}
  .form-row{grid-template-columns:1fr}
  th,td{padding:10px 12px}
  .topbar{padding:0 16px}
  .hide-mobile{display:none}
  .appt-card{flex-wrap:wrap}
  .dash-grid{grid-template-columns:1fr!important}
}
@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── STATE ──
const USERS = [
  {email:'admin@medi360.gr',password:'medi360',name:'Johan Panou',role:'Admin',initials:'JP'},
  {email:'demo@medi360.gr', password:'demo123', name:'Demo User',  role:'Staff',initials:'DU'},
];

let state = {
  user: null,
  page: 'login',
  sidebarOpen: false,
  modal: null,
  patients: [
    {id:1,name:'Αντιγόνη Παπαδοπούλου',phone:'6901234567',email:'antigo@email.gr',service:'Δερματολογία',visits:5,lastVisit:'22/04/2026',status:'Ενεργός'},
    {id:2,name:'Μένη Κωστοπούλου',phone:'6912345678',email:'meni@email.gr',service:'Ενδοδοντολογία',visits:3,lastVisit:'22/04/2026',status:'Ενεργός'},
    {id:3,name:'Σοφία Μαρκοπούλου',phone:'6923456789',email:'sofia@email.gr',service:'Αισθητική',visits:8,lastVisit:'21/04/2026',status:'Ενεργός'},
    {id:4,name:'Δήμητρα Λαζαρίδου',phone:'6934567890',email:'dimitra@email.gr',service:'Laser',visits:12,lastVisit:'21/04/2026',status:'Ανενεργός'},
    {id:5,name:'Γιώργος Τσιμικάλης',phone:'6945678901',email:'giorgos@email.gr',service:'Ορθοδοντική',visits:2,lastVisit:'20/04/2026',status:'Ενεργός'},
    {id:6,name:'Ελένη Νικολάου',phone:'6956789012',email:'eleni@email.gr',service:'Δερματολογία',visits:7,lastVisit:'19/04/2026',status:'Ενεργός'},
  ],
  appointments: [
    {id:1,patient:'Αντιγόνη Π.',service:'Δερματολογία',time:'09:00',date:'22/04/2026',doctor:'Δρ. Σταύρου',status:'Επιβεβαιωμένο'},
    {id:2,patient:'Μένη Κ.',service:'Ενδοδοντολογία',time:'10:30',date:'22/04/2026',doctor:'Δρ. Παπαδάκης',status:'Σε αναμονή'},
    {id:3,patient:'Γιώργος Τ.',service:'Laser',time:'12:00',date:'22/04/2026',doctor:'Δρ. Σταύρου',status:'Επιβεβαιωμένο'},
    {id:4,patient:'Σοφία Μ.',service:'Αισθητική',time:'14:30',date:'23/04/2026',doctor:'Δρ. Νικολάου',status:'Επιβεβαιωμένο'},
    {id:5,patient:'Ελένη Ν.',service:'Δερματολογία',time:'16:00',date:'23/04/2026',doctor:'Δρ. Σταύρου',status:'Σε αναμονή'},
  ],
  patientSearch: '',
  patientFilter: 'Όλοι',
  apptFilter: 'Όλα',
};

function setState(patch) { Object.assign(state, patch); render(); }

// ── RENDER ──
function render() {
  const app = document.getElementById('app');
  if (!state.user) { app.innerHTML = renderLogin(); bindLogin(); return; }
  app.innerHTML = renderShell();
  bindShell();
  const content = document.getElementById('page-content');
  if (state.page === 'dashboard')    { content.innerHTML = renderDashboard(); bindDashboard(); }
  if (state.page === 'patients')     { content.innerHTML = renderPatients();  bindPatients(); }
  if (state.page === 'appointments') { content.innerHTML = renderAppts();     bindAppts(); }
  if (state.modal) renderModal();
}

// ── LOGIN ──
function renderLogin() {
  return `<div class="login-screen">
    <div class="login-blob1"></div><div class="login-blob2"></div>
    <div class="login-card"><div class="login-inner">
      <div class="login-logo">
        <div class="login-logo-mark"><span></span><span></span></div>
        <span class="login-title">medi360</span>
        <span class="login-sub">CRM Platform</span>
      </div>
      <div id="login-error" style="display:none" class="login-error"></div>
      <label class="login-label">Email</label>
      <input class="login-input" id="login-email" type="email" placeholder="email@clinic.gr" value="admin@medi360.gr"/>
      <label class="login-label">Κωδικός</label>
      <input class="login-input" id="login-pass" type="password" placeholder="••••••••" value="medi360"/>
      <button class="login-btn" id="login-btn">Σύνδεση →</button>
      <div class="login-demo" style="margin-top:24px">
        <div class="login-demo-label">Demo</div>
        <div class="login-demo-creds">admin@medi360.gr / medi360</div>
      </div>
    </div></div>
  </div>`;
}
function bindLogin() {
  document.getElementById('login-btn').onclick = () => {
    const email = document.getElementById('login-email').value;
    const pass  = document.getElementById('login-pass').value;
    const found = USERS.find(u => u.email===email && u.password===pass);
    if (found) { setState({user:found, page:'dashboard'}); }
    else {
      const err = document.getElementById('login-error');
      err.textContent = 'Λάθος email ή κωδικός';
      err.style.display = 'block';
    }
  };
  document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-btn').click(); });
}

// ── SHELL ──
function renderShell() {
  const nav = [
    {id:'dashboard',label:'Dashboard',icon:'▣',badge:null},
    {id:'patients',label:'Ασθενείς',icon:'◎',badge:state.patients.length},
    {id:'appointments',label:'Ραντεβού',icon:'◷',badge:state.appointments.filter(a=>a.status==='Σε αναμονή').length},
  ];
  const titles = {dashboard:'Dashboard',patients:'Ασθενείς',appointments:'Ραντεβού'};
  return `
  <div class="overlay ${state.sidebarOpen?'open':''}" id="overlay"></div>
  <aside class="sidebar ${state.sidebarOpen?'open':''}">
    <div class="sidebar-logo">
      <div class="logo-mark"><span></span><span></span></div>
      <div><div class="logo-text">medi360</div><span class="logo-sub">CRM</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Κύριο Μενού</div>
      ${nav.map(n=>`<div class="nav-item ${state.page===n.id?'active':''}" data-page="${n.id}">
        <span style="font-size:15px;opacity:.8">${n.icon}</span>${n.label}
        ${n.badge?`<span class="nav-badge">${n.badge}</span>`:''}
      </div>`).join('')}
    </nav>
    <div class="sidebar-footer">
      <div class="user-card" id="logout-btn">
        <div class="user-avatar">${state.user.initials}</div>
        <div style="flex:1;min-width:0"><div class="user-name">${state.user.name}</div><div class="user-role">${state.user.role}</div></div>
        <button class="logout-btn">⎋</button>
      </div>
    </div>
  </aside>
  <div class="main-area">
    <header class="topbar">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="topbar-title">${titles[state.page]||'medi360'}</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--text-3)">${new Date().toLocaleDateString('el-GR')}</span>
    </header>
    <main id="page-content"></main>
  </div>`;
}
function bindShell() {
  document.querySelectorAll('.nav-item[data-page]').forEach(el => {
    el.onclick = () => setState({page:el.dataset.page, sidebarOpen:false});
  });
  document.getElementById('hamburger').onclick = () => setState({sidebarOpen:!state.sidebarOpen});
  document.getElementById('overlay').onclick   = () => setState({sidebarOpen:false});
  document.getElementById('logout-btn').onclick = () => setState({user:null, page:'login', sidebarOpen:false});
}

// ── DASHBOARD ──
function renderDashboard() {
  const hour = new Date().getHours();
  const greet = hour<12?'Καλημέρα':hour<17?'Καλό απόγευμα':'Καλό βράδυ';
  const stats = [
    {label:'Ενεργοί Ασθενείς',value:state.patients.filter(p=>p.status==='Ενεργός').length,change:'↑ +8 αυτόν τον μήνα',up:true,icon:'◎',color:'#2B3BF0',bg:'#eef0fe'},
    {label:'Ραντεβού Σήμερα',value:state.appointments.length,change:'· '+state.appointments.filter(a=>a.status==='Σε αναμονή').length+' εκκρεμούν',up:null,icon:'◷',color:'#10b981',bg:'#d1fae5'},
    {label:'Έσοδα Μήνα',value:'€8.4k',change:'↑ +12% vs προηγ.',up:true,icon:'◈',color:'#f59e0b',bg:'#fef3c7'},
    {label:'Ποσοστό Παρ/σίας',value:'94%',change:'↓ -2% vs προηγ.',up:false,icon:'◉',color:'#6366f1',bg:'#ede9fe'},
  ];
  const recent = state.patients.slice(0,5);
  const upcoming = state.appointments.filter(a=>a.status!=='Ακυρώθηκε').slice(0,3);
  const statusBadge = s => s==='Ολοκληρώθηκε'?'badge-green':s==='Σε εξέλιξη'?'badge-amber':'badge-gray';
  return `<div class="page">
    <div class="page-header">
      <div><h1 class="page-title">${greet}, ${state.user.name.split(' ')[0]} 👋</h1>
        <p class="page-sub">${new Date().toLocaleDateString('el-GR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p></div>
      <button class="btn btn-primary" id="go-appts">+ Νέο Ραντεβού</button>
    </div>
    <div class="stats-grid">
      ${stats.map(s=>`<div class="stat-card">
        <div class="stat-icon" style="background:${s.bg};color:${s.color}">${s.icon}</div>
        <div class="stat-label">${s.label}</div>
        <div class="stat-value" style="color:${s.color}">${s.value}</div>
        <div class="stat-change ${s.up?'up':''}">${s.change}</div>
      </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:16px" class="dash-grid">
      <div class="card">
        <div class="card-header"><span class="card-title">Πρόσφατοι Ασθενείς</span>
          <button class="btn btn-ghost btn-sm" id="go-patients">Δες όλους →</button></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Ασθενής</th><th>Υπηρεσία</th><th class="hide-mobile">Τελευταία</th><th>Κατάσταση</th></tr></thead>
          <tbody>${recent.map(p=>`<tr>
            <td style="font-weight:500">${p.name}</td>
            <td><span class="badge badge-navy">${p.service}</span></td>
            <td class="hide-mobile" style="font-family:var(--mono);font-size:12px;color:var(--text-2)">${p.lastVisit}</td>
            <td><span class="badge ${p.status==='Ενεργός'?'badge-green':'badge-gray'}">${p.status}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Σήμερα</span>
          <span class="badge badge-blue">${upcoming.length} ραντεβού</span></div>
        <div style="padding:12px 16px">
          ${upcoming.map(a=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface);border-radius:8px;margin-bottom:8px">
            <div style="font-family:var(--mono);font-size:13px;font-weight:500;color:var(--blue);flex-shrink:0">${a.time}</div>
            <div><div style="font-size:13px;font-weight:500">${a.patient}</div><div style="font-size:11px;color:var(--text-2)">${a.service}</div></div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}
function bindDashboard() {
  document.getElementById('go-appts').onclick   = () => setState({page:'appointments', modal:'new-appt'});
  document.getElementById('go-patients').onclick = () => setState({page:'patients'});
}

// ── PATIENTS ──
function renderPatients() {
  let filtered = state.patients.filter(p => {
    const q = state.patientSearch.toLowerCase();
    const match = p.name.toLowerCase().includes(q)||p.service.toLowerCase().includes(q)||p.phone.includes(q);
    const filt  = state.patientFilter==='Όλοι'||p.status===state.patientFilter;
    return match && filt;
  });
  return `<div class="page">
    <div class="page-header">
      <div><h1 class="page-title">Ασθενείς</h1>
        <p class="page-sub">${state.patients.length} συνολικά · ${state.patients.filter(p=>p.status==='Ενεργός').length} ενεργοί</p></div>
      <button class="btn btn-primary" id="add-patient-btn">+ Νέος Ασθενής</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <div class="search-wrap" style="flex:1 1 240px;max-width:340px">
        <span class="search-icon">⌕</span>
        <input id="patient-search" placeholder="Αναζήτηση..." value="${state.patientSearch}"/>
      </div>
      <div style="display:flex;gap:6px">
        ${['Όλοι','Ενεργός','Ανενεργός'].map(f=>`<button class="btn btn-sm ${state.patientFilter===f?'btn-primary':'btn-ghost'}" data-filter="${f}">${f}</button>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>Ασθενής</th><th class="hide-mobile">Τηλέφωνο</th><th>Υπηρεσία</th><th class="hide-mobile">Επισκέψεις</th><th class="hide-mobile">Τελευταία</th><th>Κατάσταση</th></tr></thead>
        <tbody>${filtered.length?filtered.map(p=>`<tr>
          <td><div style="display:flex;align-items:center;gap:10px">
            <div class="avatar">${p.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
            <div><div style="font-weight:500;font-size:13px">${p.name}</div><div style="font-size:11px;color:var(--text-2)">${p.email}</div></div>
          </div></td>
          <td class="hide-mobile" style="font-family:var(--mono);font-size:12px;color:var(--text-2)">${p.phone}</td>
          <td><span class="badge badge-navy">${p.service}</span></td>
          <td class="hide-mobile" style="color:var(--text-2);text-align:center">${p.visits}</td>
          <td class="hide-mobile" style="font-family:var(--mono);font-size:12px;color:var(--text-2)">${p.lastVisit}</td>
          <td><span class="badge ${p.status==='Ενεργός'?'badge-green':'badge-gray'}">${p.status}</span></td>
        </tr>`).join(''):`<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">◎</div><div>Δεν βρέθηκαν ασθενείς</div></div></td></tr>`}
        </tbody>
      </table></div>
    </div>
  </div>`;
}
function bindPatients() {
  document.getElementById('add-patient-btn').onclick = () => setState({modal:'new-patient'});
  document.getElementById('patient-search').oninput  = e => setState({patientSearch:e.target.value});
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.onclick = () => setState({patientFilter:btn.dataset.filter});
  });
}

// ── APPOINTMENTS ──
function renderAppts() {
  const filtered = state.apptFilter==='Όλα'?state.appointments:state.appointments.filter(a=>a.status===state.apptFilter);
  const groups = {};
  filtered.forEach(a => { groups[a.date]=groups[a.date]||[]; groups[a.date].push(a); });
  const statusClass = s => s==='Επιβεβαιωμένο'?'badge-green':s==='Σε αναμονή'?'badge-amber':'badge-red';
  return `<div class="page">
    <div class="page-header">
      <div><h1 class="page-title">Ραντεβού</h1>
        <p class="page-sub">${state.appointments.length} συνολικά · ${state.appointments.filter(a=>a.status==='Επιβεβαιωμένο').length} επιβεβαιωμένα</p></div>
      <button class="btn btn-primary" id="add-appt-btn">+ Νέο Ραντεβού</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap">
      ${['Όλα','Επιβεβαιωμένο','Σε αναμονή','Ακυρώθηκε'].map(f=>`<button class="btn btn-sm ${state.apptFilter===f?'btn-primary':'btn-ghost'}" data-appt-filter="${f}">${f}</button>`).join('')}
    </div>
    ${Object.entries(groups).map(([date,appts])=>`
      <div class="date-group-label"><span style="font-family:var(--mono)">${date}</span></div>
      ${appts.map(a=>`<div class="appt-card">
        <div class="appt-time"><div class="appt-time-val">${a.time}</div><div class="appt-time-date">${a.date.slice(0,5)}</div></div>
        <div class="appt-info"><div class="appt-name">${a.patient}</div><div class="appt-meta">${a.service} · ${a.doctor}</div></div>
        <div class="appt-actions">
          <span class="badge ${statusClass(a.status)}">${a.status}</span>
          ${a.status==='Σε αναμονή'?`<button class="btn btn-sm btn-success" data-confirm="${a.id}">✓</button>`:''}
          <button class="btn btn-sm" style="background:var(--red-soft);color:var(--red)" data-cancel="${a.id}">×</button>
        </div>
      </div>`).join('')}
    `).join('')}
    ${filtered.length===0?`<div class="empty-state"><div class="empty-icon">◷</div><div>Δεν βρέθηκαν ραντεβού</div></div>`:''}
  </div>`;
}
function bindAppts() {
  document.getElementById('add-appt-btn').onclick = () => setState({modal:'new-appt'});
  document.querySelectorAll('[data-appt-filter]').forEach(btn => {
    btn.onclick = () => setState({apptFilter:btn.dataset.apptFilter});
  });
  document.querySelectorAll('[data-confirm]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.confirm);
      state.appointments = state.appointments.map(a => a.id===id?{...a,status:'Επιβεβαιωμένο'}:a);
      render();
    };
  });
  document.querySelectorAll('[data-cancel]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.cancel);
      state.appointments = state.appointments.map(a => a.id===id?{...a,status:'Ακυρώθηκε'}:a);
      render();
    };
  });
}

// ── MODALS ──
function renderModal() {
  const existing = document.getElementById('modal-overlay');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'modal-overlay';
  div.className = 'modal-overlay';
  div.innerHTML = state.modal==='new-patient' ? modalPatient() : modalAppt();
  document.body.appendChild(div);
  div.onclick = e => { if(e.target===div) closeModal(); };
  document.getElementById('modal-close').onclick = closeModal;
  document.getElementById('modal-save').onclick  = state.modal==='new-patient' ? savePatient : saveAppt;
}
function closeModal() { setState({modal:null}); }

function modalPatient() {
  return `<div class="modal">
    <div class="modal-header"><span class="modal-title">Νέος Ασθενής</span><button class="modal-close" id="modal-close">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ονοματεπώνυμο *</label><input id="f-name" placeholder="Ονοματεπώνυμο"/></div>
        <div class="form-group"><label class="form-label">Τηλέφωνο *</label><input id="f-phone" placeholder="69XXXXXXXX"/></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input id="f-email" type="email" placeholder="email@example.gr"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Υπηρεσία</label>
          <select id="f-service"><option value="">Επιλογή...</option>${['Δερματολογία','Αισθητική','Laser','Ενδοδοντολογία','Ορθοδοντική'].map(s=>`<option>${s}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Κατάσταση</label>
          <select id="f-status"><option>Ενεργός</option><option>Ανενεργός</option></select></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Ακύρωση</button>
      <button class="btn btn-primary" id="modal-save">Αποθήκευση</button>
    </div>
  </div>`;
}
function savePatient() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name||!phone) return;
  state.patients.push({
    id:Date.now(), name, phone,
    email: document.getElementById('f-email').value,
    service: document.getElementById('f-service').value,
    status: document.getElementById('f-status').value,
    visits:0, lastVisit: new Date().toLocaleDateString('el-GR')
  });
  setState({modal:null});
}

function modalAppt() {
  return `<div class="modal">
    <div class="modal-header"><span class="modal-title">Νέο Ραντεβού</span><button class="modal-close" id="modal-close">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Ασθενής *</label><input id="a-patient" placeholder="Ονοματεπώνυμο"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ημερομηνία *</label><input id="a-date" type="date"/></div>
        <div class="form-group"><label class="form-label">Ώρα *</label><input id="a-time" type="time"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Υπηρεσία</label>
          <select id="a-service"><option value="">Επιλογή...</option>${['Δερματολογία','Αισθητική','Laser','Ενδοδοντολογία','Ορθοδοντική'].map(s=>`<option>${s}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Ιατρός</label>
          <select id="a-doctor"><option value="">Επιλογή...</option>${['Δρ. Σταύρου','Δρ. Παπαδάκης','Δρ. Νικολάου'].map(d=>`<option>${d}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Ακύρωση</button>
      <button class="btn btn-primary" id="modal-save">Αποθήκευση</button>
    </div>
  </div>`;
}
function saveAppt() {
  const patient = document.getElementById('a-patient').value.trim();
  const date    = document.getElementById('a-date').value;
  const time    = document.getElementById('a-time').value;
  if (!patient||!date||!time) return;
  const [y,m,d] = date.split('-');
  state.appointments.push({
    id:Date.now(), patient, time,
    date:`${d}/${m}/${y}`,
    service: document.getElementById('a-service').value,
    doctor:  document.getElementById('a-doctor').value,
    status:'Σε αναμονή'
  });
  setState({modal:null});
}

// ── INIT ──
render();
</script>
</body>
</html>
